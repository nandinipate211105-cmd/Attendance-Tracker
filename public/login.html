<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Tracker - Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="overlay"></div>

  <div class="login-container">
    <h1>Login</h1>
    <form id="loginForm">
      <select name="role" id="roleSelect" required>
        <option value="">Select Role</option>
        <option value="student">Student Login</option>
        <option value="teacher">Teacher Login</option>
      </select>


      <input type="text" name="email" placeholder="Email ID" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Login</button>
      <!-- Redirect to sign.html -->
      <button type="button" class="signin-btn" onclick="window.location.href='sign.html'">Sign Up</button>
      <!--<a href="#" class="forgot">Forgot Password?</a>-->
      <a href="forgot.html" style="font-size:14px;">Forgot Password?</a>

    </form>
  </div>

<script type="module" src="login.js"></script>
</body>

</html>
