<!DOCTYPE html>
<html>
  <style>
    .myChart{
      justify-content: center;
      align-items  : center;
      padding-top: 5%;
      text-align: center;
    }
  </style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
<body>

<canvas id="myChart" style="width:100%;max-width:600px"></canvas>

<script>
const xValues = ["CHEM", "DTIL", "IKS", "EGA", "EVENTS", "FCE", "MATHS", "PIC", "LS"];
const yValues = [10, 10, 10, 20, 10, 10, 10, 10, 10];
const barColors = [
  "#b91d47",
  "#00aba9",
  "#2b5797",
  "#e8c3b9",
  "#1e7145",
  "#473472",
  "#850E35",
  "#0C2B4E",
  "#31694E"
];

const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: "doughnut",
  data: {
    labels: xValues,
    datasets: [{
      backgroundColor: barColors,
      data: yValues
    }]
  },
  options: {
    plugins: {
      legend: {display:true},
      title: {
        display: true,
        text: "World Wine Production 2018",
        font: {size:16}
      }
    }
  }
});
</script>
</body>
